spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
lookup.video.storage-path=uploads
# --- TELJESITMENY-HANGOLAS (14 maggal rendelkezo gephez) ---
# Max parhuzamos videoelemzesi szal. Minden szal 1 videofajlt dolgoz fel egyszerre.
# max-threads=28 --> 28 fajl egyszerre, 28x3=84 parhuzamos FFmpegFrameGrabber.
# Tobb szal mint mag: mikor egy szal FFmpeg I/O-ra var, a tobbi OpenCV-t futtat.
lookup.video.analysis.max-threads=10
# Hard upper limit for simultaneously active FFmpeg grabbers across file + segment parallelism.
# IMPORTANT: computeIntraVideoSegmentCount caps segments to (max-concurrent-grabbers / max-threads).
# So to get intra-segment-count=6 with max-threads=14: need max-concurrent-grabbers >= 14*6 = 84.
# Set to 98 (14*7) to allow up to 7 segments per file with some headroom.
lookup.video.analysis.max-concurrent-grabbers=105
# Hard safety timeout for one video analysis job
lookup.video.analysis.timeout-seconds=300
# OpenCV OpenCL GPU acceleration for motion feature extraction (with CPU fallback)
# false = use 320px CPU path. The Apple OpenCL implementation is CPU-emulated (GPU shows 0% in
# Activity Monitor), so enabling it just forces a larger 512px image with no real GPU benefit.
lookup.video.analysis.gpu-processing=true
# Hardware-accelerated decode via VideoToolbox (Apple) / D3D11VA (Windows).
# Disable on Apple: VideoToolbox decodes at full 1080p, then CPU swscale converts—no faster
# than libavcodec H.264 with 2-4 decode threads, and introduces per-frame API overhead
# that makes sequential frame streaming slower than the multi-threaded CPU decoder.
lookup.video.analysis.decode-hwaccel=false
# FFmpeg decode szalak per FFmpegFrameGrabber peldany.
# 1 eleg: 14 fajl x 7 szegmens = 98 parhuzamos grabber; 2 szal eseten 196 FFmpeg-szal
# ami a 14 magon csak kontextus-valtast okozna haszon nelkul.
lookup.video.analysis.decode-threads=7
# Intra-video szegmensek szama per fajl.
# 6 szegmens: 14 fajl x 6 = 84 parhuzamos munkaegyseg (segmentExecutor pool = max-threads x N).
# Tobb grabber = tobb parhuzamos H.264 dekodolas = magasabb CPU-kihasznaltsag.
# Volt: 4, de max-concurrent-grabbers=28 miatt csak 28/14=2 szegmens volt aktiv!
lookup.video.analysis.intra-segment-count=7
# Stage-level bottleneck profiling log output (phase-2 tuning). Keep false in normal runs.
lookup.video.analysis.profile-stages=false
server.port=8080
# Broken pipe = bogeszo lapot valtott, miutan in-flight poll keres volt folyamatban; artalmatlan
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=ERROR
