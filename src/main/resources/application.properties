spring.servlet.multipart.max-file-size=1048MB
spring.servlet.multipart.max-request-size=1048MB
lookup.video.storage-path=uploads
# --- TELJESITMENY-HANGOLAS (14 maggal rendelkezo gephez) ---
# Max parhuzamos videoelemzesi szal. Minden szal 1 videofajlt dolgoz fel egyszerre.
# max-threads=14 --> 14 fajl egyszerre --> 14 CPU mag 100%-os kihasznaltsaggal.
lookup.video.analysis.max-threads=14
# Hard safety timeout for one video analysis job
lookup.video.analysis.timeout-seconds=900
# OpenCV OpenCL GPU acceleration for motion feature extraction (with CPU fallback)
lookup.video.analysis.gpu-processing=true
# Hardware-accelerated decode can reduce CPU usage; set false to free CPU cores for parallel analysis.
lookup.video.analysis.decode-hwaccel=true
# FFmpeg decode szalak per fajl. 2-4 boven eleg kepkocka-ellathoz; a tobblet CPU
# az OpenCV elemzesbe megy --> magasabb CPU-kihasznaltsag.
lookup.video.analysis.decode-threads=4
# Intra-video szegmensek szama per fajl.
#  1 = nincs felosztas: minden elemzo szal 1 fajlt dolgoz vegig (ajanlott).
#      14 szal x 1 szegmens = pontosan 14 CPU mag 100%-on.
#  N>1 = a segmentExecutor pool = max-threads x N szalat kap (javitott keplet),
#        tehat az elemzo szalak nem blokkolhatjak egymast.
lookup.video.analysis.intra-segment-count=1
server.port=8080
# Broken pipe = bogeszo lapot valtott, miutan in-flight poll keres volt folyamatban; artalmatlan
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=ERROR
