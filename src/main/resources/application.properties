spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB
lookup.video.storage-path=uploads
# 0 = auto (max(2, min(24, availableProcessors*2)))
lookup.video.analysis.max-threads=0
# Hard safety timeout for one video analysis job
lookup.video.analysis.timeout-seconds=900
# OpenCV OpenCL GPU acceleration for motion feature extraction (with CPU fallback)
lookup.video.analysis.gpu-processing=true
server.port=8080
# Broken pipe = bogeszo lapot valtott, miutan in-flight poll keres volt folyamatban; artalmatlan
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=ERROR
